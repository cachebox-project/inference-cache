---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-inferencecache-io-v1alpha1-cachebackend
  failurePolicy: Fail
  name: mcachebackend.inferencecache.io
  rules:
  - apiGroups:
    - inferencecache.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - cachebackends
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-inferencecache-io-v1alpha1-cachebackend
  failurePolicy: Fail
  name: vcachebackend.inferencecache.io
  rules:
  - apiGroups:
    - inferencecache.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - cachebackends
  sideEffects: None
