# Patch the controller Deployment to expose the webhook serving port and
# mount the cert-manager-issued serving certificate at the path
# controller-runtime's webhook server reads by default
# (/tmp/k8s-webhook-server/serving-certs).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-cache-controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
        - name: manager
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          volumeMounts:
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
              readOnly: true
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: webhook-server-cert
