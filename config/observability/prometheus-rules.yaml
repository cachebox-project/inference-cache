    #     - alert: VersionSkewDetected
    #       # DEFERRED: blocked on the backend version-skew gauge
    #       # (inferencecache_backend_version_skew). Once the operator-side
    #       # follow-up exposes that gauge, uncomment.
    #       expr: inferencecache_backend_version_skew > 0
    #       for: 1m
    #       labels:
    #         severity: warning
    #         component: inference-cache
    #       annotations:
    #         summary: "Version skew detected between engine pod and managed cache backend."
    #         runbook_url: "https://github.com/cachebox-project/inference-cache/blob/main/docs/observability/alerts.md#versionskewdetected"
    #
    #     - alert: KvEventsStaleness
    #       # DEFERRED: blocked on the per-replica last-event timestamp
    #       # (inferencecache_replica_last_event_at). Once the follow-up that
    #       # gates Ready on first-event-observed lands, uncomment.
    #       expr: time() - inferencecache_replica_last_event_at > 60
