    #       annotations:
    #         summary: "Replica {{ $labels.replica_id }} has not emitted a KV event in over 60s."
    #         runbook_url: "https://github.com/cachebox-project/inference-cache/blob/main/docs/observability/alerts.md#kveventsstaleness"
    #
    #     - alert: ServerProbeFail
    #       # DEFERRED: blocked on the synthetic end-to-end probe
    #       # (inferencecache_backend_probe_result). Once the functional Ready
    #       # gate ships its outcome counter, uncomment.
    #       expr: inferencecache_backend_probe_result{result="failed"} > 0
    #       for: 1m
    #       labels:
    #         severity: critical
