# Standalone lmcache-server backend for substrate validation on a GPU-free
# cluster (e.g. kind). The lmcache-server itself is always CPU-only (its
# storage device is `cpu` in-memory) regardless of what engine attaches to
# it — there is no separate CPU/GPU "profile" anymore: the cache server is
# engine-agnostic and the engine choice (CPU vs GPU image) lives on the
# user-owned vLLM Deployment, not on the CacheBackend.
#
# Apply this alongside a vLLM Deployment whose labels match
# `spec.engineSelector`; the controller's mutating Pod admission webhook
# auto-wires the engine pods to the resolved cache endpoint published in
# `status.endpoint` (an engine-agnostic host:port — the adapter adds the
# `lm://` scheme on the engine env). The webhook injects the engine-side
# env vars + `--kv-transfer-config` arg at pod admission (see
# docs/design/cachebackend-api.md §"Mutating Pod webhook (engine wiring)"
# for the full behavior, including the
# `inferencecache.io/skip-inject` per-pod opt-out).
apiVersion: inferencecache.io/v1alpha1
kind: CacheBackend
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
  name: cachebackend-lmcache-cpu
spec:
  type: LMCache
  deploymentKind: Deployment
  replicas: 1
  integration:
    # Case-insensitive; "vLLM" / "VLLM" / "vllm" all route to the same adapter.
    engine: vllm
    role: ReadWrite
  engineSelector:
    matchLabels:
      app.kubernetes.io/name: vllm
  backendConfig:
    # Served model identifier the matched engine pods are loaded with.
    # Plumbed to the auto-attached kvevent-subscriber sidecar's --model-id
    # so the index keys per-replica entries by model. Omit (or set empty)
    # to skip the subscriber sidecar (engine wiring still happens).
    model: Qwen/Qwen2.5-0.5B-Instruct
    # Pin to a real digest for non-local runs.
    serverImage: lmcache/standalone:latest
