# Standalone lmcache-server backend for substrate validation on a GPU-free
# cluster (e.g. kind). The lmcache-server itself is always CPU-only (its
# storage device is `cpu` in-memory) regardless of what engine attaches to
# it — there is no separate CPU/GPU "profile" anymore: the cache server is
# engine-agnostic and the engine choice (CPU vs GPU image) lives on the
# operator-owned vLLM Deployment, not on the CacheBackend.
#
# Apply this alongside a vLLM Deployment whose labels match
# `spec.engineSelector`; a future mutating webhook will wire the engine
# pods to the resolved `lm://<svc>:65432` endpoint published in
# `status.endpoint`. Until that webhook lands, set the engine-side env vars
# + `--kv-transfer-config` arg manually (see docs/design/cachebackend-api.md
# §backendConfig keys for the full set).
apiVersion: inferencecache.io/v1alpha1
kind: CacheBackend
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
  name: cachebackend-lmcache-cpu
spec:
  type: LMCache
  deploymentKind: Deployment
  replicas: 1
  integration:
    # Case-insensitive; "vLLM" / "VLLM" / "vllm" all route to the same adapter.
    engine: vllm
    role: ReadWrite
  engineSelector:
    matchLabels:
      app.kubernetes.io/name: vllm
  backendConfig:
    # Pin to a real digest for non-local runs.
    serverImage: lmcache/standalone:latest
