# Minimum sample for kind=CachePolicy.
# This is the kubebuilder-generated default; it MUST apply cleanly to the
# current schema. Demonstrates the three operator-meaningful overrides on
# top of server defaults.
apiVersion: inferencecache.io/v1alpha1
kind: CachePolicy
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
  name: cachepolicy-sample
spec:
  evictionTTL: 30m
  minimumPrefixTokens: 32
  lookupTimeoutMs: 50
