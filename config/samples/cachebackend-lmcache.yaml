# A managed LMCache backend the controller reconciles into a standalone
# lmcache-server Deployment + Service. Engine pods (vLLM) are user-owned;
# spec.engineSelector identifies the pods the controller's mutating Pod
# admission webhook auto-wires to the resolved cache endpoint published
# in status.endpoint (as an engine-agnostic host:port — the adapter adds
# the lm:// scheme on the engine env). Pods labeled to match are
# auto-injected at admission with LMCACHE_REMOTE_URL/SERDE/CHUNK_SIZE/
# LOCAL_CPU/MAX_LOCAL_CPU_SIZE + VLLM_USE_V1 + the LMCache
# `--kv-transfer-config` arg; user-set env/args on the pod template
# survive injection (the adapter merges, never clobbers). A pod can opt
# out per-instance with the annotation `inferencecache.io/skip-inject`.
#
# Phase 1 manages a Deployment + ClusterIP Service on port 65432 (the
# canonical LMCache lm:// port), plus an optional HorizontalPodAutoscaler
# from spec.autoscaling. spec.storage.pvc provisions a PersistentVolumeClaim
# owner-referenced to the CacheBackend and mounts it into the cache-server
# pod (see recipe-persistent-cache.yaml for a worked example). Switching the
# lmcache-server to actually spill KV to that volume — a disk-backed storage
# device — is a separate follow-up; until then the volume is mounted but the
# server still keeps KV in memory. A persistent backend must be single-replica
# (a ReadWriteOnce PVC can't be multi-attached).
#
# Override the lmcache-server image (defaults to a pinned lmcache/standalone
# version; keep it wire-compatible with the engine's lmcache client) or the
# server command via backendConfig until first-class spec fields land.
apiVersion: inferencecache.io/v1alpha1
kind: CacheBackend
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
  name: cachebackend-lmcache
spec:
  type: LMCache
  deploymentKind: Deployment
  replicas: 1
  integration:
    # Case-insensitive; "vLLM" / "VLLM" / "vllm" all route to the same adapter.
    engine: vllm
    role: ReadWrite
  engineSelector:
    matchLabels:
      app.kubernetes.io/name: vllm
  backendConfig:
    # Served model identifier the matched engine pods are loaded with.
    # Plumbed to the auto-attached kvevent-subscriber sidecar's --model-id
    # so the index keys per-replica entries by model. Omit (or set empty)
    # to skip the subscriber sidecar (engine wiring still happens).
    model: meta-llama/Meta-Llama-3-8B-Instruct
    # Matches the pinned adapter default; pin to an `@sha256:` digest for
    # non-local runs, and keep the lmcache version wire-compatible with the
    # engine's lmcache client (see docs/design/cachebackend-api.md).
    serverImage: lmcache/standalone:v0.4.7
    # LMCache server storage device; "cpu" (in-memory) is the supported default.
    # Override `serverCommand` to switch to the newer
    # `python3 -m lmcache.v1.multiprocess.server` form once stabilised.
