# A managed LMCache backend the controller reconciles into a Deployment +
# Service (and optionally a PVC + HPA). The Deployment is templated from the
# vLLM + LMCache reference stack (docs/reference-stack/manifests/deployment.yaml).
#
# This sample is ephemeral and single-replica. Add spec.storage.pvc for
# persistent cache state, or spec.autoscaling for CPU-driven HPA scaling.
# Persistent storage currently requires a single replica (per-replica PVCs are
# a follow-up); admission rejects spec.storage.pvc + multi-replica.
#
# image/model default to the reference stack's vLLM+LMCache image and gated
# model; override them via backendConfig until first-class spec fields land.
apiVersion: inferencecache.io/v1alpha1
kind: CacheBackend
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
  name: cachebackend-lmcache
spec:
  type: LMCache
  deploymentKind: Deployment
  replicas: 1
  integration:
    engine: vLLM
    role: ReadWrite
    lookupTimeoutMs: 20
    minimumPrefixTokens: 32
  backendConfig:
    # Pin to a real digest for non-local runs (see docs/reference-stack/VERSIONS.md).
    image: lmcache/vllm-openai:latest
    model: meta-llama/Llama-3.1-8B-Instruct
