# A managed LMCache backend the controller reconciles into a standalone
# lmcache-server Deployment + Service. Engine pods (vLLM) are user-owned;
# spec.engineSelector identifies the pods a future mutating webhook will
# wire to the resolved lm:// endpoint published in status.endpoint. Until
# that webhook lands, the engine-side env vars + `--kv-transfer-config`
# arg must be set manually (see the runtime adapter for the exact set:
# LMCACHE_REMOTE_URL/SERDE/CHUNK_SIZE/LOCAL_CPU/MAX_LOCAL_CPU_SIZE +
# VLLM_USE_V1).
#
# Phase 1 manages a Deployment + ClusterIP Service on port 65432 (the
# canonical LMCache lm:// port). Storage/PVC + autoscaling and richer
# fail-open serving semantics are tracked separately.
#
# Override the lmcache-server image (defaults to lmcache/standalone:latest)
# or the server command via backendConfig until first-class spec fields land.
apiVersion: inferencecache.io/v1alpha1
kind: CacheBackend
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
  name: cachebackend-lmcache
spec:
  type: LMCache
  deploymentKind: Deployment
  replicas: 1
  integration:
    # Case-insensitive; "vLLM" / "VLLM" / "vllm" all route to the same adapter.
    engine: vllm
    role: ReadWrite
    lookupTimeoutMs: 20
    minimumPrefixTokens: 32
  engineSelector:
    matchLabels:
      app.kubernetes.io/name: vllm
  backendConfig:
    # Pin to a real digest for non-local runs.
    serverImage: lmcache/standalone:latest
    # LMCache server storage device; "cpu" (in-memory) is the supported default.
    # Override `serverCommand` to switch to the newer
    # `python3 -m lmcache.v1.multiprocess.server` form once stabilised.
