# A managed LMCache backend the controller reconciles into a Deployment + Service.
# The Deployment is templated from the vLLM + LMCache reference stack
# (docs/reference-stack/manifests/deployment.yaml).
#
# Phase 1 (C2) manages a Deployment + ClusterIP Service and publishes the
# in-cluster endpoint to status. Storage/PVC + autoscaling (C3) and fail-open
# serving semantics (C4) are tracked separately.
#
# image/model default to the reference stack's vLLM+LMCache image and gated
# model; override them via backendConfig until first-class spec fields land.
apiVersion: inferencecache.io/v1alpha1
kind: CacheBackend
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
  name: cachebackend-lmcache
spec:
  type: LMCache
  deploymentKind: Deployment
  replicas: 1
  integration:
    engine: vLLM
    role: ReadWrite
    lookupTimeoutMs: 20
    minimumPrefixTokens: 32
  backendConfig:
    # Pin to a real digest for non-local runs (see docs/reference-stack/VERSIONS.md).
    image: lmcache/vllm-openai:latest
    model: meta-llama/Llama-3.1-8B-Instruct
