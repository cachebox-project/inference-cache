# Paired sample: a CacheBackend and a matching engine Deployment.
#
# The label `app: qwen-demo` appears in TWO places — `CacheBackend.spec.
# engineSelector.matchLabels` and the Deployment's pod template
# `metadata.labels`. That label match is what binds the CR to the engine
# pods: the controller's mutating Pod admission webhook intercepts each
# pod CREATE, finds the matching CacheBackend, and injects the LMCache
# engine wiring (env vars + `--kv-transfer-config` arg). The
# kvevent-subscriber sidecar is appended in addition only when the
# controller is started with `--kvevent-subscriber-image` set (empty
# by default) AND the CR has a model id configured; otherwise the
# engine is wired without the sidecar. Drift the labels apart and the
# webhook silently no-ops, the engine runs uncached, and `kubectl get
# cachebackend` reports `Matched: 0`.
# See docs/concepts/cachebackend-engine-binding.md for the lifecycle and
# the failure-mode table.
#
# Resource naming: the CR is `qwen-demo-cache` and the engine Deployment
# is `qwen-engine`. They are deliberately named differently because the
# controller reconciles the CR into an `lmcache-server` Deployment whose
# name equals the CR's name — sharing the name with the engine Deployment
# would collide on Create. The label `app: qwen-demo` is what does the
# binding work, not the resource names.
#
# Apply order matters because the mutating Pod webhook fail-opens (admits
# the pod unmodified) when the matched CacheBackend's `status.endpoint`
# has not been published yet. Admission is CREATE-only, so a pod that
# loses this race stays uncached for its whole lifetime.
#
# Race-free recipe (recommended):
#
#   # 1. Create only the CR (first YAML document; the `---` separator
#   #    marks where the engine Deployment begins).
#   sed -n '/^---$/q;p' config/samples/cachebackend-with-engine.yaml \
#     | kubectl apply -f -
#
#   # 2. Wait for the controller to publish status.endpoint.
#   kubectl wait --for=jsonpath='{.status.endpoint}' \
#     cachebackend/qwen-demo-cache --timeout=60s
#
#   # 3. Now apply the engine Deployment.
#   sed -n '/^---$/,$p' config/samples/cachebackend-with-engine.yaml \
#     | tail -n +2 | kubectl apply -f -
#
# Quick demo (one-shot, may hit the race on a cold cluster):
#
#   kubectl apply -f config/samples/cachebackend-with-engine.yaml
#
# Detecting the race after a one-shot apply: `status.matchedEnginePods`
# counts current label matches at reconcile, not whether the pod was
# injected at CREATE — a pod that raced past admission still has the
# right labels and still counts toward `MATCHED`, so the column alone
# can't tell you the race happened. The reliable race symptom is
# per-pod: the engine pod is missing the `inferencecache.io/injected-by`
# annotation and there is no `InjectedByCacheBackend` Event on it:
#
#   kubectl get pod -l app=qwen-demo \
#     -o jsonpath='{range .items[*]}{.metadata.name}{"  "}{.metadata.annotations.inferencecache\.io/injected-by}{"\n"}{end}'
#
# A row with an empty second column raced. To fix, force admission to
# re-run by recreating the affected pods (admission is CREATE-only;
# editing labels on a live pod does NOT re-trigger):
#
#   kubectl rollout restart deploy/qwen-engine
#
# Watch the binding land:
#
#   kubectl get cachebackend qwen-demo-cache -w
#   kubectl describe pod -l app=qwen-demo | grep -E 'Events|InjectedByCacheBackend'
#
# CPU-runnable: the engine image is vLLM's dedicated CPU build, so this
# pair works on kind without a GPU. Bump the host VM's memory to ~10 GiB
# before applying (vLLM CPU baseline is ~5 GiB + KV cache).
#
# Image tags are ARCH-SPECIFIC — vLLM publishes separate tags for x86_64
# and arm64 and there is no shared "latest" multi-arch tag today. The
# default below targets x86_64 (the common cloud / CI shape). On Apple
# Silicon hosts switch the image to `vllm/vllm-openai-cpu:latest-arm64`.
apiVersion: inferencecache.io/v1alpha1
kind: CacheBackend
metadata:
  name: qwen-demo-cache
spec:
  type: LMCache
  deploymentKind: Deployment
  replicas: 1
  integration:
    engine: vllm
    role: ReadWrite
  engineSelector:
    matchLabels:
      app: qwen-demo                # <-- binding key/value (1 of 2)
  backendConfig:
    # Served model the engine pods are loaded with. Plumbed to the
    # auto-attached kvevent-subscriber sidecar so the index keys
    # per-replica entries by model.
    model: Qwen/Qwen2.5-0.5B-Instruct
    # Pin to a real digest for non-local runs.
    serverImage: lmcache/standalone:v0.4.7
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-engine
  labels:
    app: qwen-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen-demo
  template:
    metadata:
      labels:
        app: qwen-demo              # <-- binding key/value (2 of 2)
    spec:
      containers:
        - name: vllm
          # vLLM's dedicated CPU image. Arch-specific — swap to
          # `:latest-arm64` on Apple Silicon hosts.
          image: vllm/vllm-openai-cpu:latest-x86_64
          imagePullPolicy: IfNotPresent
          command: ["vllm", "serve", "Qwen/Qwen2.5-0.5B-Instruct"]
          args:
            - "--port=8000"
            - "--dtype=bfloat16"
            - "--max-model-len=8192"
            - "--enforce-eager"
            - "--enable-prefix-caching"
          env:
            - name: VLLM_CPU_KVCACHE_SPACE
              value: "4"
          ports:
            - { name: http, containerPort: 8000 }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 120
          resources:
            requests:
              cpu: "500m"
              memory: "6Gi"
          volumeMounts:
            - { name: cache-home, mountPath: /root/.cache/huggingface }
            - { name: shm, mountPath: /dev/shm }
      volumes:
        - name: cache-home
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
