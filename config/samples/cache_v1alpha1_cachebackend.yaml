# Minimum sample for kind=CacheBackend.
# This is the kubebuilder-generated default; it MUST apply cleanly to the
# current schema. For real-world deployment recipes (CPU-runnable, override
# examples, paired engine Deployments), see the hand-curated samples in this
# directory (cachebackend-*.yaml).
apiVersion: inferencecache.io/v1alpha1
kind: CacheBackend
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/managed-by: kustomize
  name: cachebackend-sample
spec:
  type: LMCache
  # Phase-1 controller manages a Deployment only; StatefulSet is enum-valid
  # but treated as unmanaged today, so an operator applying a StatefulSet
  # sample sees no Deployment/Service/status.endpoint materialise.
  deploymentKind: Deployment
  replicas: 1
  integration:
    # Runtime ID (not adapter package name). Recognised values: "vllm"
    # (default if empty) and "sglang"; case-insensitive on ingest. Today
    # only (vllm, LMCache) and (vllm, External) have a shipped adapter, so
    # "vllm" is the only value that pairs with type: LMCache here without
    # being rejected at admission.
    engine: vllm
    role: ReadWrite
  engineSelector:
    matchLabels:
      inferencecache.io/cache-enabled: "true"
  backendConfig:
    # Tiny ungated model, CPU-runnable per the project's CPU-path docs.
    model: Qwen/Qwen2.5-0.5B-Instruct
