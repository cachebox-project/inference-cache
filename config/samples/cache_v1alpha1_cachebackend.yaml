# Kubebuilder-generated minimum-viable sample: the smallest CacheBackend that
# applies cleanly against the current schema + admission webhook. Hand-curated,
# scenario-specific recipes live in the sibling cachebackend-*.yaml files.
apiVersion: inferencecache.io/v1alpha1
kind: CacheBackend
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/managed-by: kustomize
  name: cachebackend-sample
spec:
  type: LMCache
  deploymentKind: StatefulSet
  replicas: 1
  integration:
    engine: vllm
    role: ReadWrite
  engineSelector:
    matchLabels:
      inferencecache.io/cache-enabled: "true"
