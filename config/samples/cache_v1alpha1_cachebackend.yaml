# Minimum sample for kind=CacheBackend.
# This is the kubebuilder-generated default; it MUST apply cleanly to the
# current schema. For real-world deployment recipes (CPU-runnable, override
# examples, paired engine Deployments), see the hand-curated samples in this
# directory (cachebackend-*.yaml).
apiVersion: inferencecache.io/v1alpha1
kind: CacheBackend
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/managed-by: kustomize
  name: cachebackend-sample
spec:
  type: LMCache
  deploymentKind: StatefulSet
  replicas: 1
  integration:
    # Runtime ID (not adapter name). Canonical values: "vllm" (default if
    # empty) and "sglang". Case-insensitive on ingest. The (engine, type)
    # pair selects the adapter; today only (vllm, LMCache) and
    # (vllm, External) are wired.
    engine: vllm
    role: ReadWrite
  engineSelector:
    matchLabels:
      inferencecache.io/cache-enabled: "true"
  backendConfig:
    # Tiny ungated model, CPU-runnable per the project's CPU-path docs.
    model: Qwen/Qwen2.5-0.5B-Instruct
