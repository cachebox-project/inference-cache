---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inference-cache-manager-role
rules:
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments/status
  verbs:
  - get
- apiGroups:
  - inferencecache.io
  resources:
  - cachebackends
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - inferencecache.io
  resources:
  - cachebackends/finalizers
  verbs:
  - update
- apiGroups:
  - inferencecache.io
  resources:
  - cachebackends/status
  - cacheindices/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - inferencecache.io
  resources:
  - cacheindices
  verbs:
  - create
  - get
  - list
  - watch
