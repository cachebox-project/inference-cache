apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cachepolicy-viewer-role
rules:
- apiGroups:
  - inferencecache.io
  resources:
  - cachepolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - inferencecache.io
  resources:
  - cachepolicies/status
  verbs:
  - get
