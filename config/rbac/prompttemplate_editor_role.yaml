apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prompttemplate-editor-role
rules:
- apiGroups:
  - inferencecache.io
  resources:
  - prompttemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - inferencecache.io
  resources:
  - prompttemplates/status
  verbs:
  - get
