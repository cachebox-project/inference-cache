apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: controller
  name: inference-cache-controller-manager
  namespace: inference-cache-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-cache
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-cache
        app.kubernetes.io/component: controller
    spec:
      containers:
      - args:
        - --leader-elect
        command:
        - /controller
        image: controller:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        # Container ports are advertised for the optional observability
        # PodMonitor (config/observability/podmonitor.yaml) — the
        # controller-runtime manager already binds these regardless of
        # whether they're declared here, but the PodMonitor selects by
        # port-NAME (not number) so the declaration must exist. Declaring
        # ports does not open them in any way; they're purely metadata.
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: probe
          containerPort: 8081
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        # Audience-bound projected SA tokens for controller-to-server HTTP.
        # The controller-token audience gates read/probe traffic
        # (GET /snapshot and POST /probe). The policy-token audience gates the
        # write-side POST /policy path. Both are mounted alongside, NOT
        # instead of, the default automounted apiserver-bound token used by
        # controller-runtime for CRD watches + status patches.
        volumeMounts:
        - name: controller-token
          mountPath: /var/run/secrets/inferencecache.io/controller-token
          readOnly: true
        - name: policy-token
          mountPath: /var/run/secrets/inferencecache.io/policy-token
          readOnly: true
      securityContext:
        runAsNonRoot: true
      serviceAccountName: inference-cache-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: controller-token
        projected:
          sources:
          - serviceAccountToken:
              path: token
              # Must match auth.ControllerAudience and --controller-audience.
              audience: inferencecache.io/controller
              # ~1 hour. Kubelet rotates well before expiry; the poller
              # and probe client re-read the file on every request.
              expirationSeconds: 3600
      - name: policy-token
        projected:
          sources:
          - serviceAccountToken:
              path: token
              # Must match auth.PolicyAudience and --policy-audience.
              audience: inferencecache.io/policy
              # ~1 hour. Kubelet rotates well before expiry; the policy
              # pusher re-reads the file on every request.
              expirationSeconds: 3600
