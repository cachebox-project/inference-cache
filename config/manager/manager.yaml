apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: controller
  name: inference-cache-controller-manager
  namespace: inference-cache-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-cache
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-cache
        app.kubernetes.io/component: controller
    spec:
      containers:
      - args:
        - --leader-elect
        command:
        - /controller
        image: controller:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        # Container ports are advertised for the optional observability
        # PodMonitor (config/observability/podmonitor.yaml) — the
        # controller-runtime manager already binds these regardless of
        # whether they're declared here, but the PodMonitor selects by
        # port-NAME (not number) so the declaration must exist. Declaring
        # ports does not open them in any way; they're purely metadata.
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: probe
          containerPort: 8081
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        # Audience-bound projected SA token used by ALL THREE controller-
        # to-server endpoints: the CacheIndex poller (GET /snapshot), the
        # CachePolicy push (POST /policy), and the CacheBackend functional
        # probe (POST /probe). All three share one auth middleware
        # identity on the server, so one projected token serves all three.
        # Kubelet projects the token (calling TokenRequest on behalf of
        # the pod) with audience "inferencecache.io/controller" baked into
        # the JWT, and rewrites the file on rotation; the audience is
        # *enforced* later by kube-apiserver / TokenReview when the server
        # validates a bearer (operators chasing a mismatch will see the
        # diagnostic from the apiserver, not from the kubelet). Mounted
        # alongside, NOT instead of, the default automounted apiserver-
        # bound token (which the controller-runtime client uses for CRD
        # watches + status patches). Two tokens, two paths, two distinct
        # audiences — under the default apiserver audience configuration
        # a leak of one is useless on the other surface; the cross-surface
        # property only holds while the apiserver is not configured to
        # also accept inferencecache.io/controller as an apiserver audience.
        # Audience here MUST agree with auth.ControllerAudience and the
        # server's --controller-audience flag (default = same constant).
        # Drift between this manifest, the flag, and the constant is
        # caught by the EARLIER assertion in the default-install smoke
        # (docs/reference-stack/scripts/default_install_smoke.sh): the
        # cacheindex/cluster-default.status.observedServer field
        # populates only when the REAL controller's poller — driven by
        # THIS volume + path + audience — successfully scrapes the
        # server's /snapshot. The script's separate audience-binding
        # probe pod does NOT catch this kind of drift; it intentionally
        # uses its own inline projected-volume duplicate so it can
        # still verify the SERVER's audience enforcement even if this
        # manifest is broken. The envtests in pkg/server/auth and
        # internal/controller cover the apiserver- and over-the-wire-
        # enforcement halves of the contract respectively.
        volumeMounts:
        - name: controller-token
          mountPath: /var/run/secrets/inferencecache.io/controller-token
          readOnly: true
      securityContext:
        runAsNonRoot: true
      serviceAccountName: inference-cache-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: controller-token
        projected:
          sources:
          - serviceAccountToken:
              path: token
              # The audience kubelet binds into the JWT before writing
              # the file. Must match the server's --controller-audience.
              audience: inferencecache.io/controller
              # ~1 hour. Kubelet rotates well before expiry; the poller
              # re-reads the file on every scrape so rotation is picked
              # up immediately without process restart.
              expirationSeconds: 3600
