apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: controller
  name: inference-cache-controller-manager
  namespace: inference-cache-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-cache
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-cache
        app.kubernetes.io/component: controller
    spec:
      containers:
      - args:
        - --leader-elect
        command:
        - /controller
        image: controller:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      securityContext:
        runAsNonRoot: true
      serviceAccountName: inference-cache-controller-manager
      terminationGracePeriodSeconds: 10
