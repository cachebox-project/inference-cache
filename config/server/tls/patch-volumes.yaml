# Strategic-merge patch: mount the cert-manager Secret (inference-cache-server-tls,
# from certificate.yaml) into the server. volumeMounts + volumes merge BY NAME,
# so this ADDS the grpc-tls entries without replacing any the base Deployment may
# grow later. Read-only; the server loads the keypair at startup and re-reads it
# when cert-manager rotates the Secret (no restart). The pod stays Pending until
# cert-manager populates the Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-cache-server
  namespace: inference-cache-system
spec:
  template:
    spec:
      containers:
        - name: server
          volumeMounts:
            - name: grpc-tls
              mountPath: /var/run/secrets/tls
              readOnly: true
      volumes:
        - name: grpc-tls
          secret:
            secretName: inference-cache-server-tls
