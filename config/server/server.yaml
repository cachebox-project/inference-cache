apiVersion: v1
kind: ServiceAccount
metadata:
  name: inference-cache-server
  namespace: inference-cache-system
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
# The server calls the apiserver's TokenReview API to authenticate the
# controller's /snapshot scrapes and /policy pushes, so it needs a
# projected SA token.
automountServiceAccountToken: true
---
# Narrow ClusterRole + binding granting ONLY the permission the server
# actually exercises: creating TokenReview objects to validate the
# controller's bearer tokens on /snapshot and /policy. The canonical
# alternative, system:auth-delegator, also grants SubjectAccessReview
# (for authz delegation), which the server does not call —
# least-privilege beats convenience here, especially for a
# security-hardening change.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inference-cache-server-tokenreview
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: inference-cache-server-tokenreview
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: inference-cache-server-tokenreview
subjects:
- kind: ServiceAccount
  name: inference-cache-server
  namespace: inference-cache-system
---
apiVersion: v1
kind: Service
metadata:
  name: inference-cache-server
  namespace: inference-cache-system
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
  ports:
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    # Internal controller-facing listener (serves /snapshot AND /policy).
    # Restricted by NetworkPolicy to the controller's pod selector;
    # authentication on both L7 endpoints is enforced by the server's
    # TokenReview middleware.
    - name: snapshot
      port: 8081
      targetPort: snapshot
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-cache-server
  namespace: inference-cache-system
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
spec:
  # Phase-1: single replica. The cache index is in-memory soft state and
  # cross-instance aggregation is a later concern (see the index design notes
  # under docs/design/). HA/multi-replica is tracked separately.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-cache
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-cache
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: inference-cache-server
      # Mount the projected SA token so the server can call TokenReview to
      # authenticate the controller's /snapshot scrape and /policy push.
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: server:latest
          imagePullPolicy: IfNotPresent
          command:
            - /server
          args:
            - --grpc-bind-address=:9090
            - --http-bind-address=:8080
            - --snapshot-bind-address=:8081
            # Restrict /snapshot AND /policy to the controller's ServiceAccount.
            # Both endpoints share this listener (and the NetworkPolicy on
            # :8081); together the L7 auth and the L3/L4 pod-selector gate form
            # independent defences. See config/server/networkpolicy.yaml.
            - --allowed-controller-sa=system:serviceaccount:inference-cache-system:inference-cache-controller-manager
            # gRPC :9090 is PLAINTEXT in the default install. Service TLS is an
            # opt-in overlay (config/overlays/server-tls, via the
            # config/server/tls component) that adds --tls-cert-file /
            # --tls-key-file + the cert-manager Secret volume. The default stays
            # plaintext until the gRPC CLIENTS are TLS-ready — the in-cluster
            # kvevent-subscriber producer (dials :9090 for ReportCacheState) and
            # the external gateway client (E1) both speak plaintext today, so
            # flipping TLS on by default would break ingestion. See
            # docs/design/grpc-tls.md.
          ports:
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: snapshot
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              # Sized to fit the default DefaultMaxEntries=1,000,000 cap at
              # ~540 MiB peak RSS plus headroom (see
              # docs/operations/index-sizing.md). Operators on small workloads
              # can dial this down; operators on large workloads should bump
              # both this and DefaultMaxEntries.
              memory: 1Gi
            requests:
              cpu: 50m
              # Request is the binpacking + node-pressure-eviction floor. Sized
              # toward a "moderate" working set (~250K-500K entries, ~150-300 MiB
              # peak RSS per the sizing guide) so the scheduler can place the pod
              # somewhere it has room to grow into the 1Gi limit without becoming
              # the first eviction target under node memory pressure. Operators
              # running closer to the cap should bump both the request and the
              # limit in lockstep — and, if they need MORE than the cap,
              # DefaultMaxEntries is a compile-time constant in pkg/index, so
              # exceeding it currently requires building a custom server image.
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
