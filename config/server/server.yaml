apiVersion: v1
kind: ServiceAccount
metadata:
  name: inference-cache-server
  namespace: inference-cache-system
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
# The server does not call the Kubernetes API; don't automount a token.
automountServiceAccountToken: false
---
apiVersion: v1
kind: Service
metadata:
  name: inference-cache-server
  namespace: inference-cache-system
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
  ports:
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-cache-server
  namespace: inference-cache-system
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
spec:
  # Phase-1: single replica. The cache index is in-memory soft state and
  # cross-instance aggregation is a later concern (see the index design notes
  # under docs/design/). HA/multi-replica is tracked separately.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-cache
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-cache
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: inference-cache-server
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: server:latest
          imagePullPolicy: IfNotPresent
          command:
            - /server
          args:
            - --grpc-bind-address=:9090
            - --http-bind-address=:8080
          ports:
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
