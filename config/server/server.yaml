apiVersion: v1
kind: ServiceAccount
metadata:
  name: inference-cache-server
  namespace: inference-cache-system
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
# The server calls the apiserver's TokenReview API to authenticate the
# controller's /snapshot scrapes, so it needs a projected SA token.
automountServiceAccountToken: true
---
# Narrow ClusterRole + binding granting ONLY the permission the server
# actually exercises: creating TokenReview objects to validate /snapshot
# bearer tokens. The canonical alternative, system:auth-delegator, also
# grants SubjectAccessReview (for authz delegation), which the server
# does not call — least-privilege beats convenience here, especially for
# a security-hardening change.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inference-cache-server-tokenreview
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: inference-cache-server-tokenreview
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: inference-cache-server-tokenreview
subjects:
- kind: ServiceAccount
  name: inference-cache-server
  namespace: inference-cache-system
---
apiVersion: v1
kind: Service
metadata:
  name: inference-cache-server
  namespace: inference-cache-system
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
  ports:
    - name: grpc
      port: 9090
      targetPort: grpc
      protocol: TCP
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    # Internal snapshot listener. Restricted by NetworkPolicy to the
    # controller's pod selector; authentication on the L7 endpoint is
    # enforced by the server's TokenReview middleware.
    - name: snapshot
      port: 8081
      targetPort: snapshot
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-cache-server
  namespace: inference-cache-system
  labels:
    app.kubernetes.io/name: inference-cache
    app.kubernetes.io/component: server
spec:
  # Phase-1: single replica. The cache index is in-memory soft state and
  # cross-instance aggregation is a later concern (see the index design notes
  # under docs/design/). HA/multi-replica is tracked separately.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-cache
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-cache
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: inference-cache-server
      # Mount the projected SA token so the server can call TokenReview to
      # authenticate the controller's /snapshot scrape.
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: server:latest
          imagePullPolicy: IfNotPresent
          command:
            - /server
          args:
            - --grpc-bind-address=:9090
            - --http-bind-address=:8080
            - --snapshot-bind-address=:8081
            # Restrict /snapshot to the controller's ServiceAccount. The
            # NetworkPolicy adds an L3/L4 gate on the same port (config/server/
            # networkpolicy.yaml); together they form independent gates.
            - --snapshot-allowed-sa=system:serviceaccount:inference-cache-system:inference-cache-controller-manager
          ports:
            - name: grpc
              containerPort: 9090
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: snapshot
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
