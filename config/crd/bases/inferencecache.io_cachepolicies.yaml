---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: cachepolicies.inferencecache.io
spec:
  group: inferencecache.io
  names:
    kind: CachePolicy
    listKind: CachePolicyList
    plural: cachepolicies
    shortNames:
    - cpol
    singular: cachepolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.eviction
      name: Eviction
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CachePolicy is the Schema for cache lookup and eviction policy.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CachePolicySpec defines cache lookup and eviction policy.
            properties:
              eviction:
                default: LRU
                description: |-
                  Eviction is the index entry-eviction algorithm applied when the index
                  exceeds its entry cap. LRU evicts the oldest-by-lastSeen entry first;
                  LFU evicts the lowest-access-count entry first (ties broken on oldest
                  lastSeen). The TTL sweep removes stale entries regardless of this
                  choice, so LFU does not pin hot-but-stale entries. Defaults to LRU.
                enum:
                - LRU
                - LFU
                type: string
              evictionTTL:
                description: EvictionTTL is the maximum time a cache entry should
                  remain usable.
                type: string
              lookupTimeoutMs:
                description: LookupTimeoutMs bounds cache lookup latency in milliseconds.
                format: int32
                minimum: 0
                type: integer
              minimumMatchedTokens:
                default: 64
                description: |-
                  MinimumMatchedTokens is the minimum number of MATCHED prefix tokens a
                  LookupRoute response must achieve before PREFIX_MATCH is returned.
                  Distinct from MinimumPrefixTokens, which is a request-side gate on
                  effective prefix tokens BEFORE the index is consulted; this is a
                  result-side floor applied AFTER the lookup, against the actual matched
                  overlap. Replicas whose match falls below this threshold are filtered
                  from the response; if no replica clears the floor, the reason_code is
                  downgraded to NO_HINT so the gateway round-robins honestly instead of
                  being credited with a trivial chat-template-only match. Defaults to 64
                  (4 blocks at the typical 16-token block size — well above the framing
                  tokens identical across every replica). Set to 0 to disable the floor
                  entirely.
                format: int32
                minimum: 0
                type: integer
              minimumPrefixTokens:
                description: MinimumPrefixTokens is the minimum prefix length required
                  before lookup.
                format: int32
                minimum: 0
                type: integer
              routingFloorScore:
                default: "0.1"
                description: |-
                  RoutingFloorScore is the per-replica score below which a PREFIX_MATCH
                  response downgrades to NO_HINT. The LookupRoute ranker computes

                    score = matched_tokens × freshness × pressure_factor × slo_bias × distinguishing_power

                  where distinguishing_power = 1 - (num_replicas_holding_match /
                  num_replicas_in_scope), and the other factors collapse to 1 when
                  their inputs are absent (no stats reported → pressure_factor = 1;
                  no SLO hint → slo_bias = 1). Overlaps held by every replica
                  (chat-template framing, RAG corpus headers, custom system prompts
                  shared across the deployment) collapse to distinguishing_power=0 →
                  score=0 → caught by this floor. The default "0.1" catches the
                  score=0 trivial-overlap case and any near-zero scores combining
                  heavy load (low pressure_factor), near-expired freshness, or
                  heavy diffusion. Raise (e.g. "5") for stricter routing-signal
                  hygiene; "0" disables the floor entirely (raw-recall benchmarking,
                  ranker debugging).

                  Distinct from MinimumPrefixTokens: that field is a request-side gate
                  on the request's claimed prefix length BEFORE the index is consulted;
                  this is a result-side floor on the per-replica score AFTER the
                  distinguishing-power-aware ranker has scored every candidate.

                  Composes with MinimumMatchedTokens (above): the MatchedTokens floor is
                  applied first (filters sub-floor replicas per-replica), then the
                  RoutingFloorScore floor is applied to the top-ranked survivor's
                  score. Both floors can downgrade a PREFIX_MATCH to NO_HINT
                  independently; an operator can disable either by setting it to its
                  opt-out value (0 / "0").

                  Encoded as a stringified float to avoid introducing the first
                  float-typed field into the CachePolicy schema (the others are
                  int32 / duration). Validated by the +kubebuilder:validation:Pattern
                  marker: digits with an optional decimal part, no sign.
                pattern: ^(0|[1-9][0-9]*)(\.[0-9]+)?$
                type: string
            type: object
          status:
            description: CachePolicyStatus defines observed policy state.
            properties:
              conditions:
                description: Conditions describe the latest observations of the policy.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the latest generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
