syntax = "proto3";

package cache.v1alpha1;

option go_package = "github.com/cachebox-project/inference-cache/pkg/server/proto/cache/v1alpha1;cachev1alpha1pb";

service CacheBackendService {
  rpc Ping(PingRequest) returns (PingResponse);
}

message PingRequest {}

message PingResponse {
  string status = 1;
}
