syntax = "proto3";

package inferencecache.v1alpha1;

option go_package = "github.com/cachebox-project/inference-cache/pkg/server/proto/inferencecache/v1alpha1;inferencecachev1alpha1pb";

// InferenceCache is the cache-policy control-plane API. See
// docs/design/grpc-contract.md.
//
// Guarantees:
//   - RenderTemplate / LookupRoute / LookupPDRoute / GetCacheState are
//     side-effect-free apart from emitting metrics.
//   - Fail-open: an empty result is always valid regardless of the
//     reason_code (NO_HINT, POLICY_REQUIRES_CHAIN, TIMEOUT, or one of the
//     diagnostic codes UNKNOWN_TENANT / UNKNOWN_MODEL / UNKNOWN_HASH_SCHEME);
//     clients treat it as a no-op and route as they normally would.
//   - prefix_hash and block_hashes bytes are engine-defined and only matched
//     within a matching hash_scheme; the server never interprets them.
//   - RenderTemplate is deterministic for a fixed
//     (template_ref, variables, template_revision).
//   - CacheStateUpdate / PrefixEntry carry metadata only — never KV tensors or
//     prompt text.
service InferenceCache {
  // Consumer side (gateways).
  rpc RenderTemplate(RenderTemplateRequest) returns (RenderTemplateResponse);
  rpc LookupRoute(LookupRouteRequest) returns (LookupRouteResponse);
  rpc LookupPDRoute(LookupPDRouteRequest) returns (LookupPDRouteResponse);
  rpc GetCacheState(GetCacheStateRequest) returns (GetCacheStateResponse);

  // Producer side (engine adapters).
  rpc ReportCacheState(stream CacheStateUpdate) returns (Ack);
  rpc PublishEvent(CacheEvent) returns (Ack);

  // Observer side (dashboards, debug tooling).
  rpc StreamCacheEvents(StreamEventsRequest) returns (stream CacheEvent);
  rpc StreamMetrics(StreamMetricsRequest) returns (stream Metric);
}

message RenderTemplateRequest {
  string template_ref = 1; // PromptTemplate name (namespace/name)
  map<string, string> variables = 2; // slot values
  string tenant_id = 3;
}

message RenderTemplateResponse {
  bytes rendered_prompt = 1; // tokens or raw text
  bytes stable_prefix_hash = 2; // for cache lookup
  bytes tenant_namespace = 3; // HMAC-keyed in Phase 2 isolation mode
  string reason_code = 4; // OK | TEMPLATE_NOT_FOUND | RENDER_ERROR
  string template_revision = 5; // for cache invalidation
}

message SLO {
  int32 ttft_ms = 1;
  int32 tbt_ms = 2;
}

message LookupRouteRequest {
  string model_id = 1;
  string tenant_id = 2;
  bytes prefix_hash = 3;
  int32 prefix_token_count = 4;
  string hash_scheme = 5; // engine-defined compatibility tag
  SLO slo = 6;
  // Engine-aligned ordered block-hash chain for longest-prefix matching. When
  // non-empty the server walks the chain block-by-block and returns each
  // replica's longest common leading run; matched_tokens reflects that run's
  // token count. block_token_counts is parallel to block_hashes (same length,
  // same order) — the per-block token count is used to compute matched_tokens.
  // An empty chain falls back to exact-match on prefix_hash. A non-empty
  // chain whose block_token_counts length disagrees with block_hashes is
  // malformed: the server returns NO_HINT rather than downgrading to the
  // legacy single-blob path (symmetric with chain ingest, which drops the
  // entry — a wrong hint is worse than a stale one).
  repeated bytes block_hashes = 7;
  repeated int32 block_token_counts = 8;
  // Dual-input tokenization (server-owned). A gateway that carries no tokenizer
  // sends the prompt and lets the server tokenize + fingerprint:
  //   - token_ids: pre-tokenized input. The server derives the content-
  //     fingerprint chain directly (pkg/fingerprint) — no tokenizer needed, so
  //     this path works in every build.
  //   - prompt_text: raw prompt text. The server wraps it as a SINGLE `user`
  //     chat message, applies model_id's chat template WITH the assistant
  //     generation prompt appended, then tokenizes (requires the cgo tokenizer
  //     build; otherwise the request fails open to NO_HINT). This single-turn
  //     wrapping is the only shape supported today — multi-turn message arrays
  //     and already-rendered / completion-style prompts are not (they would
  //     fingerprint a different token sequence than the engine caches); a
  //     structured-messages field is a future addition. token_ids is the escape
  //     hatch for any caller that needs exact control over the tokenized input.
  // Precedence: an explicit prefix_hash / block_hashes chain (a gateway that
  // already fingerprinted) wins; else token_ids; else prompt_text. Every path
  // funnels into the same content-fingerprint block-chain match, so a
  // (model, text) lookup matches the engine's cached prefix by construction.
  // hash_scheme / model_id / tenant_id are still supplied by the caller (engine
  // routing config, not tokenizer knowledge).
  repeated uint32 token_ids = 9;
  string prompt_text = 10;
  // Adapter (e.g. LoRA) the request targets. The content fingerprint is derived
  // from token IDs ALONE, so two requests with identical tokens under different
  // adapters produce the SAME prefix_hash / block_hashes. adapter_id partitions
  // the INDEX so those identical keys cannot alias: a lookup only ever matches
  // entries ingested under the same adapter_id. It is NOT mixed into the hash —
  // the fingerprint construction and its golden vectors are unchanged.
  //
  // Empty/unset is the default partition and is exactly the behavior before this
  // field existed: a single-adapter (or LoRA-free) deployment ingests and looks
  // up under "" and is unaffected. A lookup that sets adapter_id will NOT match
  // entries ingested without one (and vice versa) — producer and consumer must
  // agree on the identifier, the same rule hash_scheme already follows. The
  // server treats the value as an opaque string and never interprets it.
  // Additive, v1alpha1-compatible.
  string adapter_id = 11;
}

// CacheTier ranks WHERE a replica holds a matched prefix, from the most local /
// fastest tier (T1 — engine KV cache, e.g. GPU HBM) down to progressively colder
// tiers (T2 — external offload such as an LMCache CPU/host pool; T3 — remote /
// disaggregated store). Lower enum value = more local = preferred. UNSPECIFIED is
// the wire default: a producer that never sets a tier, or a hint with no prefix
// evidence (TENANT_HOT / AFFINITY_HINT), leaves it UNSPECIFIED so old clients that
// ignore the field are unaffected. Tier *detection* (classifying a hold as T2/T3)
// is out of scope here — the current ingest path tags every stored prefix T1.
enum CacheTier {
  CACHE_TIER_UNSPECIFIED = 0;
  CACHE_TIER_T1 = 1;
  CACHE_TIER_T2 = 2;
  CACHE_TIER_T3 = 3;
}

message ReplicaScore {
  string replica_id = 1;
  float score = 2; // higher is better
  int32 matched_tokens = 3;
  float estimated_cache_hit_prob = 4;
  // Tier from which this replica can serve the ENTIRE matched prefix. For a
  // block-chain match it is the least-local (coldest) tier across the matched
  // run — a single block only present in a colder tier constrains the whole
  // run, so claiming a warmer tier would overstate the hint. Per-block holds
  // remain most-local at ingest; only this across-run summary is constraining.
  // UNSPECIFIED when the hint carries no prefix evidence (TENANT_HOT /
  // AFFINITY_HINT). Additive, v1alpha1-compatible.
  CacheTier tier = 5;
}

message LookupRouteResponse {
  repeated ReplicaScore replica_scores = 1;
  string reason_code = 2; // PREFIX_MATCH | TENANT_HOT | AFFINITY_HINT | NO_HINT | POLICY_REQUIRES_CHAIN | TIMEOUT | UNKNOWN_TENANT | UNKNOWN_MODEL | UNKNOWN_HASH_SCHEME
  int64 lookup_latency_us = 3;
  // Canonical token IDs the server tokenized for this request, echoed back ONLY
  // when the server itself tokenized prompt_text. A gateway that sent token_ids
  // already has them, so this stays empty on that path (avoids echoing a large
  // token array on every lookup). Forward these exact tokens to the engine
  // (e.g. /v1/completions with a token-ID prompt) so the engine caches the same
  // tokens the fingerprint was computed over — match by construction.
  repeated uint32 token_ids = 4;
  // Echo of the adapter partition the index was consulted in — the request's
  // adapter_id. Lets a caller confirm end-to-end which partition answered
  // without correlating back to its own request. Empty on the default
  // (no-adapter) partition, which is what every pre-adapter client sees, and
  // also empty on the fail-open envelopes returned BEFORE the index is
  // consulted (TIMEOUT, tokenizer fail-open, POLICY_REQUIRES_CHAIN), where no
  // partition was resolved. Additive, v1alpha1-compatible.
  string adapter_id = 5;
}

message LookupPDRouteRequest {
  string model_id = 1;
  string tenant_id = 2;
  bytes prefix_hash = 3;
  int32 prefix_token_count = 4;
  string pd_topology_ref = 5; // namespace/name
}

message LookupPDRouteResponse {
  string prefill_replica_id = 1;
  string decode_replica_id = 2;
  string transport_hint = 3; // Mooncake | NIXL | Direct
  string reason_code = 4;
}

message PrefixEntry {
  bytes prefix_hash = 1;
  int32 token_count = 2;
  // Engine-aligned ordered chain of block hashes covered by this entry, paired
  // with their per-block token counts (parallel arrays — same length, same
  // order). Engines that hash per KV block (vLLM, SGLang) can report the chain
  // here in a single entry; the server expands it into per-block index entries
  // so longest-prefix lookups can compute the longest common leading run.
  // Optional — entries that only set prefix_hash + token_count remain valid
  // for exact-match indexing (legacy path).
  repeated bytes block_hashes = 3;
  repeated int32 block_token_counts = 4;
  // Adapter (e.g. LoRA) whose KV this entry describes. Per-ENTRY rather than
  // per-update because one engine replica can hold KV for several adapters at
  // once — vLLM's BlockStored carries a per-event lora_id, and a subscriber
  // batches events across adapters into a single CacheStateUpdate. Empty falls
  // back to CacheStateUpdate.adapter_id, and an empty result is the default
  // partition (legacy behavior). Additive, v1alpha1-compatible.
  string adapter_id = 5;
}

message ReplicaStats {
  string replica_id = 1;
  int64 cache_memory_bytes = 2;
  float hit_rate = 3;
  float pressure = 4;
  // Opaque version string identifying the client-side cache library the
  // reporting replica is linked against (e.g. an LMCache client release).
  // The string is engine-opaque on the wire: no semver parsing or ordering
  // is implied at this layer. Empty / unset is allowed and means "unknown";
  // older producers that don't fill the field MUST keep being accepted
  // (additive, v1alpha1-compatible).
  //
  // Reserves field 5 for the producer half of an end-to-end client/server
  // version-skew detection surface. The consumer half — server-side storage
  // and per-CacheBackend exposure — lands in a follow-up change and is not
  // part of this contract update; producers can populate the field today,
  // and the server will silently keep accepting it either way.
  string client_version = 5;

  // T2 (external offload tier, e.g. LMCache) cumulative reload accounting,
  // sourced from the engine's vllm:external_prefix_cache_{hits,queries}_total
  // counters (lifetime token totals, monotonic; reset on engine restart). The
  // server derives a presence-aware tier-2 hit-rate per CacheBackend from these:
  // a 0% rate is only meaningful once the tier was actually queried
  // (t2_query_tokens > 0), which distinguishes "tier-2 silently broken" from
  // "tier-2 not yet exercised". Both default to 0 for producers that don't
  // populate them (additive, v1alpha1-compatible).
  int64 t2_hit_tokens = 6;
  int64 t2_query_tokens = 7;
}

message CacheStateUpdate {
  string replica_id = 1;
  string model_id = 2;
  string tenant_id = 3;
  string hash_scheme = 4; // engine-defined
  int64 timestamp_us = 5;
  repeated PrefixEntry prefixes = 6;
  ReplicaStats stats = 7;
  // Default adapter partition for every PrefixEntry in this update that does not
  // set its own adapter_id. Convenience for a producer whose replica serves a
  // single adapter; a multi-adapter producer sets it per entry instead. Empty =
  // the default partition (legacy behavior). Stats are adapter-independent (one
  // ReplicaStats per replica) and are NOT partitioned by this field. Additive,
  // v1alpha1-compatible.
  string adapter_id = 8;
}

message CacheSummary {
  int64 total_prefixes = 1;
  int64 hot_prefixes = 2; // access count > threshold
}

message GetCacheStateRequest {
  string model_id = 1;
  string tenant_id = 2;
}

message GetCacheStateResponse {
  repeated ReplicaStats replicas = 1;
  CacheSummary summary = 2;
}

message CacheEvent {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    PREFIX_ADDED = 1;
    PREFIX_EVICTED = 2;
    REPLICA_UPDATED = 3;
    ALL_CLEARED = 4;
  }
  Type type = 1;
  string replica_id = 2;
  string model_id = 3;
  string tenant_id = 4;
  bytes prefix_hash = 5;
  int64 timestamp_us = 6;
  // Adapter partition a PREFIX_EVICTED removal targets. Set, the server drops
  // the prefix only from that partition; empty, it drops the prefix across
  // EVERY adapter partition — the conservative legacy behavior (removal is
  // soft state: an over-eager drop costs a cache miss, never a wrong answer),
  // and identical to today for producers that never populate the field.
  // Ignored by ALL_CLEARED (a cache flush clears the replica across every
  // adapter) and by REPLICA_UPDATED (liveness is adapter-independent).
  // Additive, v1alpha1-compatible.
  string adapter_id = 7;
}

message StreamEventsRequest {
  string model_id = 1;
  string tenant_id = 2;
  repeated CacheEvent.Type types = 3; // empty = all
}

message StreamMetricsRequest {
  repeated string names = 1; // empty = all
}

message Metric {
  string name = 1;
  string type = 2; // gauge | counter | histogram
  map<string, string> labels = 3;
  double value = 4;
  int64 timestamp_us = 5;
}

message Ack {
  bool accepted = 1;
  string reason_code = 2;
}
