name: Release SBOM

on:
  release:
    types:
    - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to attach SBOM artifacts to
        required: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
  SYFT_VERSION: v1.20.0

jobs:
  generate-sbom:
    name: Generate SBOMs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Validate release tag
      env:
        RELEASE_TAG: ${{ env.RELEASE_TAG }}
      run: |
        set -euo pipefail
        if [[ ! "$RELEASE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
          echo "Release tag must be a Docker-compatible tag: [A-Za-z0-9_][A-Za-z0-9_.-]{0,127}" >&2
          exit 1
        fi

    - name: Checkout SBOM tooling
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        ref: ${{ github.workflow_sha }}
        persist-credentials: false

    - name: Verify GitHub Release exists
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_TAG: ${{ env.RELEASE_TAG }}
      run: gh release view "$RELEASE_TAG" >/dev/null

    - name: Set up Syft
      uses: ./.github/actions/setup-syft
      with:
        version: ${{ env.SYFT_VERSION }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Checkout release source
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        ref: refs/tags/${{ env.RELEASE_TAG }}
        path: release-source
        persist-credentials: false

    - name: Generate source SBOM
      run: make -f "$GITHUB_WORKSPACE/Makefile" -C "$GITHUB_WORKSPACE/release-source" sbom-release TAG="${RELEASE_TAG}" SBOM_DIR="$GITHUB_WORKSPACE/dist/sbom"

    - name: Generate published image SBOMs
      run: make -f "$GITHUB_WORKSPACE/Makefile" -C "$GITHUB_WORKSPACE/release-source" sbom-registry-images TAG="${RELEASE_TAG}" SBOM_DIR="$GITHUB_WORKSPACE/dist/sbom" SBOM_REGISTRY_PUBLISH_MISSING=1 SBOM_IMAGE_CONTEXT="$GITHUB_WORKSPACE/release-source" SBOM_DOCKERFILE="$GITHUB_WORKSPACE/release-source/dockerfiles/Dockerfile"

    - name: Upload SBOM workflow artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: release-sboms
        path: dist/sbom/*.spdx.json
        if-no-files-found: error

  attach-sbom:
    name: Attach SBOMs to GitHub Release
    runs-on: ubuntu-latest
    needs:
    - generate-sbom
    permissions:
      contents: write
    steps:
    - name: Download SBOM workflow artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        name: release-sboms
        path: dist/sbom

    - name: Attach SBOMs to GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_TAG: ${{ env.RELEASE_TAG }}
      run: gh release upload "${RELEASE_TAG}" dist/sbom/*.spdx.json --clobber
