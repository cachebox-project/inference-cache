name: Release SBOM

on:
  release:
    types:
    - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to attach SBOM artifacts to
        required: true

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
  SYFT_VERSION: v1.20.0

jobs:
  release-sbom:
    name: Generate and Attach SBOMs
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      with:
        ref: ${{ env.RELEASE_TAG }}

    - name: Set up Syft
      uses: ./.github/actions/setup-syft
      with:
        version: ${{ env.SYFT_VERSION }}

    - name: Generate SBOMs
      run: make sbom TAG="${RELEASE_TAG}"

    - name: Upload SBOM workflow artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: release-sboms
        path: dist/sbom/*.spdx.json
        if-no-files-found: error

    - name: Attach SBOMs to GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release upload "${RELEASE_TAG}" dist/sbom/*.spdx.json --clobber
