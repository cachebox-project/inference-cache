name: CI

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-proto:
    name: Lint, Test, Proto
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Install protoc
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler

    - name: Verify vendor-neutral naming
      run: make verify-naming

    - name: Verify no internal issue-tracker references
      run: make verify-no-internal-refs

    - name: Set up buf
      uses: bufbuild/buf-setup-action@v1
      with:
        version: 1.69.0
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Lint proto contract
      run: make proto-lint

    - name: Lint
      run: |
        make lint
        git diff --exit-code
        make ci-lint

    - name: Verify CRDs & deepcopy up to date
      run: |
        make manifests generate
        git diff --exit-code -- config api

    - name: Generate protobufs
      run: make proto-gen

    # Fetch envtest binaries (apiserver + etcd) so the controller integration
    # tests (internal/controller/integration_test.go) run against a real
    # apiserver instead of skipping. The test skip guard checks $KUBEBUILDER_ASSETS,
    # so exporting it via $GITHUB_ENV is enough to flip them on.
    # The script fails fast if the path is empty or missing, so a `make test-env`
    # failure can't silently skip the integration suite and let CI go green.
    - name: Install envtest binaries
      run: |
        set -euo pipefail
        path="$(make test-env | tail -1)"
        if [ -z "$path" ] || [ ! -d "$path" ]; then
          echo "make test-env did not produce a valid envtest path: '$path'" >&2
          exit 1
        fi
        echo "KUBEBUILDER_ASSETS=$path" >> "$GITHUB_ENV"

    - name: Test (race detector)
      run: make test-race

    - name: Coverage gate
      run: make cover-check

    # Blocking: the dependency graph (Go toolchain, x/net, grpc) is clear of
    # called vulnerabilities. A regression here fails CI.
    - name: Vulnerability scan
      run: make vulncheck

    - name: Build binaries
      run: make build

  image-build:
    name: Image Build
    runs-on: ubuntu-latest
    needs: lint-test-proto
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build images
      run: make image-build
