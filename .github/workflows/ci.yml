name: CI

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-proto:
    name: Lint, Test, Proto
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Install protoc
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler

    - name: Lint
      run: |
        make lint
        git diff --exit-code
        make ci-lint

    - name: Generate protobufs
      run: make proto-gen

    - name: Test
      run: make test

    - name: Build binaries
      run: make build

  image-build:
    name: Image Build
    runs-on: ubuntu-latest
    needs: lint-test-proto
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build images
      run: make image-build
