name: CI

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-proto:
    name: Lint, Test, Proto
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Install protoc
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler

    - name: Verify vendor-neutral naming
      run: make verify-naming

    - name: Set up buf
      uses: bufbuild/buf-setup-action@v1
      with:
        version: 1.69.0
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Lint proto contract
      run: make proto-lint

    - name: Lint
      run: |
        make lint
        git diff --exit-code
        make ci-lint

    - name: Verify CRDs & deepcopy up to date
      run: |
        make manifests generate
        git diff --exit-code -- config api

    - name: Generate protobufs
      run: make proto-gen

    - name: Test (race detector)
      run: make test-race

    # Advisory for now: govulncheck currently reports known CVEs in the Go
    # toolchain stdlib + x/net + grpc that require a deliberate Go 1.25 / grpc
    # upgrade (tracked separately). Surfaced here for visibility; flip to
    # blocking (drop continue-on-error) once the upgrade lands and it's clean.
    - name: Vulnerability scan (advisory)
      run: make vulncheck
      continue-on-error: true

    - name: Build binaries
      run: make build

  image-build:
    name: Image Build
    runs-on: ubuntu-latest
    needs: lint-test-proto
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build images
      run: make image-build
