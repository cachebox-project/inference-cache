name: CI

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

# Workflow-level default; each job re-declares its minimal scope.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-generated-proto:
    name: Lint, Generated Code, Proto
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Verify vendor-neutral naming
      run: make verify-naming

    - name: Verify no internal issue-tracker references
      run: make verify-no-internal-refs

    - name: Install protoc
      env:
        PROTOC_VERSION: 34.1
        PROTOC_SHA256: af27ea66cd26938fe48587804ca7d4817457a08350021a1c6e23a27ccc8c6904
      run: |
        set -euo pipefail
        archive="$RUNNER_TEMP/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
        curl -fsSL -o "$archive" "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
        echo "${PROTOC_SHA256}  $archive" | sha256sum -c -
        mkdir -p "$RUNNER_TEMP/protoc"
        unzip -q "$archive" -d "$RUNNER_TEMP/protoc"
        echo "$RUNNER_TEMP/protoc/bin" >> "$GITHUB_PATH"
        "$RUNNER_TEMP/protoc/bin/protoc" --version

    - name: Set up buf
      uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99  # v1
      with:
        version: 1.69.0
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Lint proto contract
      run: make proto-lint

    # Guards v1alpha1 wire compatibility: renumbered or removed fields, RPC
    # removals, and incompatible type changes fail the PR. Skipped on push to
    # main (no base ref to compare against).
    - name: Fetch base ref for buf breaking
      if: github.event_name == 'pull_request'
      env:
        PR_BASE_REF: ${{ github.base_ref }}
      run: |
        git fetch --no-tags origin "+refs/heads/${PR_BASE_REF}:refs/remotes/origin/${PR_BASE_REF}"

    - name: Check for breaking proto changes
      if: github.event_name == 'pull_request'
      env:
        PR_BASE_REF: ${{ github.base_ref }}
      run: buf breaking --against ".git#ref=origin/${PR_BASE_REF}"

    - name: Lint
      run: |
        make lint
        git diff --exit-code
        make ci-lint

    # promtool check rules + promtool test rules + drift check that the
    # PrometheusRule CR (config/observability/prometheus-rules.yaml) stays in
    # sync with the flat rules file (alerting-rules.yaml). The promtool
    # binary is downloaded from upstream Prometheus releases by the make
    # target (no go install — the module path doesn't satisfy Go's v3+
    # major-version rule).
    - name: Verify Prometheus alerting rules
      run: make verify-prometheus

    - name: Verify CRDs & deepcopy up to date
      run: |
        make manifests generate
        git diff --exit-code -- config api

    - name: Verify protobufs up to date
      run: |
        make proto-gen
        if [ -n "$(git status --porcelain -- pkg/server/proto)" ]; then
          git status --short -- pkg/server/proto
          exit 1
        fi

    # Cross-language golden fixture: prove the checked-in
    # pkg/fingerprint/testdata/golden_vectors.json matches its generator, so a
    # generator-only edit (or a hand-edited fixture) can't merge silently. The
    # make target skips without python3+xxhash; installing the pinned dep here
    # makes the check real in CI.
    - name: Verify golden vectors match generator
      run: |
        python3 -m pip install --quiet -r pkg/fingerprint/testdata/requirements.txt
        make verify-golden-vectors

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
      with:
        go-version-file: go.mod
        cache: true

    # Fetch envtest binaries (apiserver + etcd + kubectl) so the controller
    # integration tests (internal/controller/integration_test.go) run against
    # a real apiserver instead of skipping AND so the "Verify samples" step
    # below has the envtest apiserver + the kubectl that `make verify-samples`
    # shells out to. The test skip guard checks $KUBEBUILDER_ASSETS, so
    # exporting it via $GITHUB_ENV is enough to flip them on.
    # The script fails fast if the path is empty or missing, so a `make test-env`
    # failure can't silently skip the integration suite and let CI go green.
    - name: Install envtest binaries
      run: |
        set -euo pipefail
        path="$(make test-env | tail -1)"
        if [ -z "$path" ] || [ ! -d "$path" ]; then
          echo "make test-env did not produce a valid envtest path: '$path'" >&2
          exit 1
        fi
        echo "KUBEBUILDER_ASSETS=$path" >> "$GITHUB_ENV"

    - name: Test (race detector)
      run: make test-race

    - name: Coverage gate
      run: make cover-check

    # Runs every YAML under config/samples/ through admission against an
    # envtest apiserver + the CacheBackend webhook (server-side dry-run).
    # Catches sample-vs-schema drift before release — a sample that would
    # be rejected by `kubectl apply` on a real cluster fails the PR.
    - name: Verify samples
      run: make verify-samples

  # GPU-free end-to-end gate for the content-fingerprint routing path: a fake
  # engine publishes vLLM-shaped BlockStored events over a real ZMQ socket, the
  # real kvevent-subscriber pipeline derives content fingerprints, the real
  # server indexes them, and LookupRoute must return PREFIX_MATCH (with the
  # publishing replica as the hint) for the published prefix and NO_HINT for a
  # novel one — plus the producer-contract guard (no token_ids → warn + index
  # nothing). Unlike the scheduled kind canaries (which pull real engine
  # images), this needs no GPU, no image, no cluster — it runs on every PR in
  # seconds and locks the routing path against the all-NO_HINT regression.
  fingerprint-e2e:
    name: Fingerprint Routing E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Fingerprint routing e2e
      run: make test-fingerprint-e2e

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
      with:
        go-version-file: go.mod
        cache: true

    # Blocking: the dependency graph (Go toolchain, x/net, grpc) is clear of
    # called vulnerabilities. A regression here fails CI.
    - name: Vulnerability scan
      run: make vulncheck

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Build binaries
      run: make build

  tokenize-cgo:
    name: Tokenizer cgo Build Tag (${{ matrix.build-tag }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build-tag:
        - smgcgo
    permissions:
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Setup Rust
      run: |
        rustup toolchain install stable --profile minimal
        rustup default stable
        rustc --version
        cargo --version

    - name: Build and test smgcgo tokenizer path
      env:
        CARGO_NET_RETRY: 3
        TOKENIZE_CGO_BUILD_TAG: ${{ matrix.build-tag }}
      run: make tokenize-cgo-test

  lint-test-proto:
    name: Lint, Test, Proto
    runs-on: ubuntu-latest
    needs:
    - lint-generated-proto
    - test
    - fingerprint-e2e
    - vulnerability-scan
    - build
    - tokenize-cgo
    if: always()
    permissions:
      contents: read
    steps:
    - name: Check split CI jobs
      env:
        LINT_GENERATED_PROTO_RESULT: ${{ needs.lint-generated-proto.result }}
        TEST_RESULT: ${{ needs.test.result }}
        FINGERPRINT_E2E_RESULT: ${{ needs.fingerprint-e2e.result }}
        VULNERABILITY_SCAN_RESULT: ${{ needs.vulnerability-scan.result }}
        BUILD_RESULT: ${{ needs.build.result }}
        TOKENIZE_CGO_RESULT: ${{ needs.tokenize-cgo.result }}
      run: |
        failed=0
        for item in \
          "lint-generated-proto:$LINT_GENERATED_PROTO_RESULT" \
          "test:$TEST_RESULT" \
          "fingerprint-e2e:$FINGERPRINT_E2E_RESULT" \
          "vulnerability-scan:$VULNERABILITY_SCAN_RESULT" \
          "build:$BUILD_RESULT" \
          "tokenize-cgo:$TOKENIZE_CGO_RESULT"; do
          name="${item%%:*}"
          result="${item#*:}"
          if [ "$result" != "success" ]; then
            echo "✗ $name finished with result=$result"
            failed=1
          else
            echo "✓ $name passed"
          fi
        done
        exit "$failed"

  image-build:
    name: Image Build
    runs-on: ubuntu-latest
    needs:
    - lint-generated-proto
    - test
    - fingerprint-e2e
    - vulnerability-scan
    - build
    permissions:
      contents: read
      # Required for Trivy SARIF upload to the Security tab.
      security-events: write
    env:
      # Deterministic tag the Trivy steps address. `git describe` would
      # otherwise produce per-commit refs the scan steps can't pin.
      IMAGE_TAG: ci-${{ github.sha }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

    - name: Build images
      run: make image-build TAG=${IMAGE_TAG}

    # Both image scans run with exit-code: 0 (and both SARIF uploads run with
    # if: always()) so a failing controller scan can't short-circuit the server
    # scan/upload. A final aggregation step parses both SARIFs and fails the
    # job if either image had HIGH/CRITICAL findings.
    - name: Scan controller image with Trivy
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        image-ref: ghcr.io/cachebox-project/inference-cache-controller:${{ env.IMAGE_TAG }}
        severity: CRITICAL,HIGH
        vuln-type: os,library
        exit-code: '0'
        format: sarif
        output: trivy-controller.sarif

    # Skip on forked PRs: GITHUB_TOKEN is read-only for forks regardless of
    # requested permissions, so upload-sarif would fail and break public CI for
    # outside contributors. The scan + aggregation gate still runs.
    - name: Upload Trivy SARIF (controller)
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3
      with:
        sarif_file: trivy-controller.sarif
        category: trivy-controller

    - name: Scan server image with Trivy
      if: always()
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        image-ref: ghcr.io/cachebox-project/inference-cache-server:${{ env.IMAGE_TAG }}
        severity: CRITICAL,HIGH
        vuln-type: os,library
        exit-code: '0'
        format: sarif
        output: trivy-server.sarif

    - name: Upload Trivy SARIF (server)
      if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3
      with:
        sarif_file: trivy-server.sarif
        category: trivy-server

    - name: Fail if any Trivy scan found HIGH/CRITICAL
      if: always()
      shell: bash
      run: |
        fail=0
        for f in trivy-controller.sarif trivy-server.sarif; do
          if [ ! -f "$f" ]; then
            echo "✗ $f: missing (scan step did not run or failed)"
            fail=1
            continue
          fi
          n=$(jq '[.runs[]?.results[]?] | length' "$f")
          if [ "$n" -gt 0 ]; then
            echo "✗ $f: $n HIGH/CRITICAL finding(s)"
            fail=1
          else
            echo "✓ $f: clean"
          fi
        done
        exit "$fail"
