name: Codex Review

# Automated code review on pull requests using OpenAI Codex.
#
# Requires a repository secret OPENAI_API_KEY (Settings → Secrets and variables
# → Actions). The review is advisory: it posts a comment, it does NOT gate the
# merge. The build/test gate lives in ci.yml.
#
# Forked PRs are skipped — pull_request does not expose secrets to forks, and we
# deliberately avoid pull_request_target (which would run untrusted code with
# secret access).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: codex-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codex:
    name: Codex Review
    runs-on: ubuntu-latest
    # Skip forks and Dependabot (neither gets secret access) so they don't show
    # a spurious failure. Dependabot pushes to a same-repo branch, so the fork
    # check below does not catch it — pull_request runs for Dependabot are
    # withheld secrets, so the Codex step would fail with no OPENAI_API_KEY.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v6
      with:
        # Check out the PR's merge commit.
        ref: refs/pull/${{ github.event.pull_request.number }}/merge
        persist-credentials: false

    - name: Pre-fetch base and head refs for the PR
      env:
        PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        git fetch --no-tags origin \
          "$PR_BASE_REF" \
          "+refs/pull/$PR_NUMBER/head"

    - name: Run Codex
      id: run_codex
      uses: openai/codex-action@e0fdf01220eb9a88167c4898839d273e3f2609d1  # v1
      with:
        openai-api-key: ${{ secrets.OPENAI_API_KEY }}
        sandbox: read-only
        prompt: |
          You are reviewing PR #${{ github.event.pull_request.number }} for ${{ github.repository }},
          a vendor-neutral, open-source Kubernetes-native cache plane for LLM inference.

          Treat this as a fresh, cold review — even if you've reviewed this PR before. Your
          job is to surface ALL findings the project would want to know about, not a curated
          subset. A fix push between rounds is not a license to roam to new territory; give
          the same findings a fresh reviewer would give on the same diff.

          ## Inputs

          Diff under review:
            git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

          Pull request title and body:
          ----
          ${{ github.event.pull_request.title }}
          ${{ github.event.pull_request.body }}

          ## Method (follow in order, do not skip steps)

          STEP 1 — Enumerate. List every file changed by this PR, grouped by directory.
          Note (and skip review of) any generated files: anything under config/crd/,
          config/rbac/role.yaml, pkg/server/proto/, any file named zz_generated*. These
          are regenerated, not hand-edited; findings on them are noise.

          STEP 2 — For each non-generated changed file, walk all four checks below. Even
          if a file is clean against a check, you must explicitly note "Clean" for that
          category in the per-category summary (STEP 4). Do not silently omit categories.

          STEP 3 — Collect findings across all files. Be exhaustive: surface every issue
          you would mention if asked "what's wrong with this PR?" Include nits — round-
          to-round variance is worse than a long nit list.

          STEP 4 — Output in this structure:

              ## Files reviewed
              <bulleted list, grouped by directory; mark each as `[reviewed]` or `[skipped — generated]`>

              ## Findings

              ### Blocking
              <file:line — finding — 1-2 sentence rationale>
              <or: "None.">

              ### Should-fix
              <same format>
              <or: "None.">

              ### Nit
              <same format>
              <or: "None.">

              ## Per-category coverage
              1. Vendor-neutral naming: <Clean | findings above at: file:line, file:line>
              2. Contract & spec / docs sync: <Clean | findings above at: ...>
              3. gRPC fail-open semantics: <Clean | findings above at: ...>
              4. Quality (tests / error wrapping / package placement / generated drift): <Clean | findings above at: ...>

              ## Verdict
              <approve | approve-with-nits | changes-requested>

          ## Checks (apply ALL to EVERY non-generated file)

          1. Vendor-neutral naming (HARD RULE — see CONTRIBUTING.md). No `oci`, `oracle`,
             `*.oci.com`, or `oraclecloud.com` may appear in any core-identity surface:
             API/CRD group, kubebuilder domain, proto package, gRPC service/package, Go
             module path, default namespace, image registry, Helm chart, or any user-facing
             default. Cloud-specific integration is allowed ONLY in an isolated optional
             adapter under pkg/adapters/.../ — never in core controllers, CRD types, the
             proto contract, or default config/samples.

          2. Contract & spec. Changes should match the design docs under docs/design/.
             Any change to proto/ MUST be mirrored in docs/design/grpc-contract.md (field
             numbers, reason-code enums, RPC signatures). v1alpha1 must stay backward-
             compatible: no renumbered/removed proto fields, no breaking CRD field changes.

          3. gRPC fail-open semantics. Lookups (RenderTemplate, LookupRoute, LookupPDRoute,
             GetCacheState) must be side-effect-free and fail open (empty result +
             NO_HINT/OK), never erroring on the hot path. prefix_hash is engine-opaque
             bytes; CacheStateUpdate / PrefixEntry carry metadata only — never KV tensors
             or prompt text.

          4. Quality. New/changed behavior has tests (control-flow paths exercised, ideally
             over the wire); errors are wrapped not swallowed; code lands in the right
             package per the layout in CONTRIBUTING.md; generated code (config/crd,
             zz_generated*, pkg/server/proto) is regenerated, not hand-edited.

          ## Format constraints

          - Per-finding rationale: 1-2 sentences max. Brevity per finding, not brevity
            overall.
          - File:line references required for every finding (use the post-diff line numbers).
          - No prose preamble, no closing summary other than the Verdict line.
          - If something is genuinely unclear from the diff alone, mark it as a Should-fix
            "Verify:" finding rather than omitting it.

  post_feedback:
    name: Post Codex feedback
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: Report Codex feedback
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
      env:
        CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
      with:
        github-token: ${{ github.token }}
        script: |
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body: `### Codex review\n\n${process.env.CODEX_FINAL_MESSAGE}`,
          });
