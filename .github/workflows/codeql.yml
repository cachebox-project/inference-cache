name: CodeQL

# GitHub-native static analysis for Go. Runs on every PR + push to main, plus a
# weekly cron so newly-published query patches catch existing code without
# waiting for a code change. Findings show up in the repo Security tab.

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main
  schedule:
    - cron: "17 9 * * 1" # weekly Monday 09:17 UTC

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
    - name: Checkout
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v6

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Initialize CodeQL
      uses: github/codeql-action/init@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3
      with:
        languages: go

    - name: Autobuild
      uses: github/codeql-action/autobuild@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3
      with:
        category: "/language:go"
