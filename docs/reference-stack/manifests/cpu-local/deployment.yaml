# CPU-only prefix-cache demo — runs WITHOUT a GPU and WITHOUT LMCache.
#
# Scope: demonstrates a prefix-cache hit on a small model using vLLM's CPU build.
# It does NOT exercise the KV-cache event stream — that path requires the vLLM
# v1 engine, and v1 does not support CPU execution (it raises NotImplementedError
# under VLLM_USE_V1=1). So this variant runs on v0 (VLLM_USE_V1=0) and omits the
# --kv-events-config publisher.
#
# To validate the event decode/redaction path without a GPU, use the synthetic
# publisher instead (../../README.md "CPU-only local check"); that is the
# verified GPU-less check. The real KV-cache event capture happens on the GPU path.
#
# NOTE: this manifest is NOT verified end-to-end (no GPU here, and image pulls are
# blocked in the authoring environment). Flags follow the vLLM CPU docs; treat it
# as a starting point and adjust for your host.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-cpu-sanity
  namespace: cache-substrate
  labels:
    app: vllm-cpu-sanity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-cpu-sanity
  template:
    metadata:
      labels:
        app: vllm-cpu-sanity
    spec:
      containers:
        - name: vllm
          # vLLM's dedicated CPU image (arch-tagged). Use -arm64 on ARM hosts.
          image: vllm/vllm-openai-cpu:latest-x86_64
          imagePullPolicy: IfNotPresent
          command: ["vllm", "serve", "Qwen/Qwen2.5-0.5B-Instruct"]
          args:
            - "--port=8000"
            - "--dtype=bfloat16"
            - "--max-model-len=8192"
            - "--enable-prefix-caching"   # prefix caching exists on v0; this is the demo
          env:
            - name: VLLM_USE_V1            # CPU requires v0; v1 is GPU-only
              value: "0"
            - name: VLLM_CPU_KVCACHE_SPACE # GiB of CPU KV cache
              value: "4"
          ports:
            - { name: http, containerPort: 8000 }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 120
          volumeMounts:
            - { name: cache-home, mountPath: /root/.cache/huggingface }
            - { name: shm, mountPath: /dev/shm }
      volumes:
        - name: cache-home
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-cpu-sanity
  namespace: cache-substrate
  labels:
    app: vllm-cpu-sanity
spec:
  type: NodePort
  selector:
    app: vllm-cpu-sanity
  ports:
    - { name: http, port: 8000, targetPort: http, nodePort: 30080 }
