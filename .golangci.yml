version: "2"
run:
  tests: true
linters:
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - bin
      - dist
      - .cache
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - bin
      - dist
      - .cache
      - third_party$
      - builtin$
      - examples$
